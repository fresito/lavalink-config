server:
  port: 2333
  address: 0.0.0.0

plugins:
  lavasrc:
    providers:
      - "spsearch:%QUERY%"
      - "ytsearch:%QUERY%"
      - "ytmsearch:%QUERY%"
      - "scsearch:%QUERY%"
    sources:
      spotify:
        clientId: "e1afc6b673e1493d8deecc2c339eef7b"
        clientSecret: "303d66fcd6c9471d9704262d97333afc"
        countryCode: "FR"
        playlistLoadLimit: 6
        albumLoadLimit: 6

lavalink:
  plugins:
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.2.0"
      repository: "https://maven.topi.wtf/releases"
  server:
    password: "${LAVALINK_SERVER_PASSWORD}"
    sources:
      youtube: true
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

spring:
  main:
    banner-mode: log

logging:
  level:
    root: INFO
    lavalink: INFO
